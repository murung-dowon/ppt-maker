<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>People Analytics — 핵심 역할</title>
  <link rel="stylesheet" href="../core/theme.css">
  <link rel="stylesheet" href="../core/slide-base.css">
  <link rel="stylesheet" href="../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">

    <h1 class="slide-title" data-anim="fade-in">핵심 역할과 역량</h1>
    <div class="slide-title-bar"></div>

    <div class="slide-body-content">

      <ul class="slide-list numbered">
        <li data-anim="slide-up" data-delay="1">
          <div>
            <strong>데이터 수집 및 정제</strong><br>
            <span style="color: var(--color-text-muted); font-size: var(--font-size-small);">
              HRIS, 설문, 성과 데이터 등 다양한 소스를 통합·정제합니다
            </span>
          </div>
        </li>
        <li data-anim="slide-up" data-delay="2">
          <div>
            <strong>통계 분석 및 모델링</strong><br>
            <span style="color: var(--color-text-muted); font-size: var(--font-size-small);">
              이직 예측, 성과 분석 등 HR 문제를 데이터로 풀어냅니다
            </span>
          </div>
        </li>
        <li data-anim="slide-up" data-delay="3">
          <div>
            <strong>인사이트 전달</strong><br>
            <span style="color: var(--color-text-muted); font-size: var(--font-size-small);">
              분석 결과를 경영진과 HR 파트너가 이해할 수 있도록 시각화합니다
            </span>
          </div>
        </li>
        <li data-anim="slide-up" data-delay="4">
          <div>
            <strong>의사결정 지원</strong><br>
            <span style="color: var(--color-text-muted); font-size: var(--font-size-small);">
              데이터 기반으로 채용, 육성, 보상 전략 수립을 지원합니다
            </span>
          </div>
        </li>
      </ul>

    </div>

  </div>

  <script src="../core/nav.js"></script>
  <script src="../core/editor.js"></script>
</body>
</html>
