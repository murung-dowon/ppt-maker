<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Big Insight</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      background: var(--color-bg);
      padding: 96px 140px;
      justify-content: center;
      align-items: flex-start;
    }

    .eyebrow {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-light);
      margin-bottom: var(--space-md);
    }

    .big-text {
      font-family: var(--font-serif);
      font-size: 58px;
      font-weight: 700;
      line-height: 1.2;
      letter-spacing: -0.03em;
      color: var(--color-text);
      max-width: 900px;
      margin-bottom: var(--space-xl);
    }

    .big-text em {
      font-style: italic;
      color: var(--color-text-muted);
    }

    .source-row {
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .source-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
    }

    .source-info .name {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--color-text);
    }

    .source-info .role {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
    }

    .rule {
      width: 100%;
      height: 1px;
      background: var(--color-border);
      margin-bottom: var(--space-lg);
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide">

    <p class="eyebrow" data-anim="fade-in" data-delay="1">핵심 인사이트</p>

    <div class="rule" data-anim="fade-in" data-delay="1"></div>

    <p class="big-text" data-anim="slide-up" data-delay="2">
      사람들은 디자인이 어떻게<br>
      생겼는지에 관한 것이라 생각합니다.<br>
      하지만 더 깊이 들어가면,<br>
      디자인은 <em>작동 방식</em>에 관한 것입니다.
    </p>

    <div class="source-row" data-anim="fade-in" data-delay="3">
      <div class="source-avatar">👤</div>
      <div class="source-info">
        <div class="name">Steve Jobs</div>
        <div class="role">New York Times, 2003</div>
      </div>
    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
