<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Callout Cards</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      background: var(--color-bg);
      padding: 64px 96px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    .callout-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-sm);
      align-items: stretch;
    }

    .n-callout {
      border-radius: var(--radius-md);
      padding: var(--space-md) var(--space-md);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .n-callout.yellow { background: var(--callout-yellow); }
    .n-callout.blue   { background: var(--callout-blue); }
    .n-callout.green  { background: var(--callout-green); }

    .callout-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .callout-emoji {
      font-size: 28px;
      line-height: 1;
    }

    .callout-number {
      font-family: var(--font-serif);
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--color-text);
    }

    .callout-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      font-weight: 600;
      color: var(--color-text);
      line-height: 1.3;
    }

    .callout-desc {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      line-height: 1.55;
    }

    .callout-rule {
      height: 1px;
      background: rgba(0,0,0,0.07);
      margin: 4px 0;
    }

    .callout-trend {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: 600;
      color: var(--color-text-muted);
    }

    .trend-up   { color: #448361; }
    .trend-warn { color: #a87845; }
  </style>
</head>
<body class="slide-body">
  <div class="slide">

    <div class="page-title" data-anim="fade-in" data-delay="1">
      <span>📊</span>
      <span>핵심 성과 지표</span>
    </div>

    <div class="callout-grid">

      <div class="n-callout yellow" data-anim="slide-up" data-delay="2">
        <div class="callout-top">
          <span class="callout-emoji">📈</span>
        </div>
        <div class="callout-number">84%</div>
        <div class="callout-label">월간 사용자 리텐션</div>
        <div class="callout-rule"></div>
        <div class="callout-desc">최근 30일 기준, 전체 활성 유저 대상 측정. 업계 평균(71%) 대비 우위.</div>
        <div class="callout-trend trend-up">↑ 전분기 대비 +12%p</div>
      </div>

      <div class="n-callout blue" data-anim="slide-up" data-delay="3">
        <div class="callout-top">
          <span class="callout-emoji">⚡</span>
        </div>
        <div class="callout-number">2.3×</div>
        <div class="callout-label">기능 도입 속도 개선</div>
        <div class="callout-rule"></div>
        <div class="callout-desc">온보딩 재설계 후 신규 피처 활성화 완료까지 소요 시간 단축.</div>
        <div class="callout-trend trend-up">↑ Q1 → Q2 비교</div>
      </div>

      <div class="n-callout green" data-anim="slide-up" data-delay="4">
        <div class="callout-top">
          <span class="callout-emoji">💰</span>
        </div>
        <div class="callout-number">$12M</div>
        <div class="callout-label">연간 반복 매출 (ARR)</div>
        <div class="callout-rule"></div>
        <div class="callout-desc">엔터프라이즈 계약 포함, 2026 H1 기준. YoY 38% 성장.</div>
        <div class="callout-trend trend-up">↑ 전년 동기 대비 +38%</div>
      </div>

    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
