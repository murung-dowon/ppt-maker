<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>B 작업</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">B 작업</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">일하는 방식을 개선하는 일</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-body-content">
      <p style="font-size:var(--font-size-body); color:var(--color-text-muted); margin-bottom:var(--space-md);" data-anim="fade-in" data-delay="3">'해야 하는 일을 더 잘할 수 있게 설계하는 일'</p>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-sm);" data-anim="fade-in" data-delay="3">
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">물류</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">입출고 및 전체 재고 현황 대시보드 구성</div>
        </div>
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">마케팅</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">성과 현황 및 추이 대시보드 구성</div>
        </div>
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">경영지원</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">결재 프로세스 재정비, 자금 현황 및 추이 대시보드</div>
        </div>
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">영업</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">영업 프로세스 재정비, 우선순위 정의</div>
        </div>
      </div>

      <div class="callout" style="margin-top:var(--space-md);" data-anim="fade-in" data-delay="4">
        반복작업 자동화 · 업무 템플릿 제정 · 협업 도구 도입 · 회의 방식 개선
      </div>
    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
