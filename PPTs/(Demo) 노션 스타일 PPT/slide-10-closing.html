<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Closing</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      background: var(--color-bg);
      padding: 96px 140px;
      justify-content: center;
      align-items: flex-start;
    }

    .closing-eyebrow {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      font-weight: 500;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-light);
      margin-bottom: var(--space-md);
    }

    .closing-title {
      font-family: var(--font-serif);
      font-size: 72px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: var(--color-text);
      margin-bottom: var(--space-lg);
    }

    .closing-title em {
      font-style: italic;
      color: var(--color-text-muted);
    }

    .rule {
      width: 100%;
      height: 1px;
      background: var(--color-border);
      margin-bottom: var(--space-lg);
    }

    .contact-row {
      display: flex;
      align-items: stretch;
      gap: var(--space-xl);
    }

    .contact-block {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .contact-label {
      font-family: var(--font-sans);
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--color-text-light);
    }

    .contact-value {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      color: var(--color-text-muted);
    }

    .contact-sep {
      width: 1px;
      background: var(--color-border);
    }

    .bottom-callout {
      margin-top: var(--space-xl);
      background: var(--callout-blue);
      border-radius: var(--radius-md);
      padding: 16px 20px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      max-width: 640px;
    }

    .bottom-callout-text {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      color: var(--color-text);
      line-height: 1.6;
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide">

    <p class="closing-eyebrow" data-anim="fade-in" data-delay="1">Product Strategy 2026</p>

    <h1 class="closing-title" data-anim="slide-up" data-delay="2">
      함께 만들어<br><em>갑시다.</em>
    </h1>

    <div class="rule" data-anim="fade-in" data-delay="2"></div>

    <div class="contact-row" data-anim="fade-in" data-delay="3">
      <div class="contact-block">
        <span class="contact-label">Team</span>
        <span class="contact-value">Strategy & Growth</span>
      </div>
      <div class="contact-sep"></div>
      <div class="contact-block">
        <span class="contact-label">Email</span>
        <span class="contact-value">strategy@company.com</span>
      </div>
      <div class="contact-sep"></div>
      <div class="contact-block">
        <span class="contact-label">Notion</span>
        <span class="contact-value">notion.so/strategy-2026</span>
      </div>
    </div>

    <div class="bottom-callout" data-anim="fade-in" data-delay="4">
      <span style="font-size:20px">📎</span>
      <p class="bottom-callout-text">
        이 문서의 전체 버전, 데이터 출처, 보충 자료는 Notion 페이지에서 확인하실 수 있습니다.
        질문·피드백·협업 제안은 언제든 환영합니다.
      </p>
    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
