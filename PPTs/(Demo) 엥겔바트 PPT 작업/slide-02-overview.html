<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A/B/C 작업 3단계 개요</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">Douglas Engelbart</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">작업은 3개 층위로 나뉜다</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-body-content">
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-md);" data-anim="fade-in" data-delay="3">

        <div class="card" style="border-top:4px solid var(--color-accent); padding:0; overflow:hidden;">
          <div class="img-placeholder" style="height:120px; border-radius:0;"></div>
          <div style="padding:var(--space-md);">
            <div style="font-size:var(--font-size-h2); font-weight:var(--font-weight-black); color:var(--color-accent); margin-bottom:var(--space-xs);">A</div>
            <div style="font-weight:var(--font-weight-bold); font-size:var(--font-size-body); margin-bottom:var(--space-xs);">본업 수행</div>
            <div style="font-size:var(--font-size-small); color:var(--color-text-muted); line-height:var(--line-height-normal);">각자 맡은 일을 알아서 잘 하는 것. 기획·개발·마케팅·영업·운영 등 실무 그 자체.</div>
          </div>
        </div>

        <div class="card" style="border-top:4px solid #888; padding:0; overflow:hidden;">
          <div class="img-placeholder" style="height:120px; border-radius:0;"></div>
          <div style="padding:var(--space-md);">
            <div style="font-size:var(--font-size-h2); font-weight:var(--font-weight-black); color:#888; margin-bottom:var(--space-xs);">B</div>
            <div style="font-weight:var(--font-weight-bold); font-size:var(--font-size-body); margin-bottom:var(--space-xs);">방식 개선</div>
            <div style="font-size:var(--font-size-small); color:var(--color-text-muted); line-height:var(--line-height-normal);">A 작업을 더 잘할 수 있도록 방식을 설계하는 일. 자동화·템플릿·협업 도구 도입.</div>
          </div>
        </div>

        <div class="card" style="border-top:4px solid #333; padding:0; overflow:hidden;">
          <div class="img-placeholder" style="height:120px; border-radius:0;"></div>
          <div style="padding:var(--space-md);">
            <div style="font-size:var(--font-size-h2); font-weight:var(--font-weight-black); color:#333; margin-bottom:var(--space-xs);">C</div>
            <div style="font-weight:var(--font-weight-bold); font-size:var(--font-size-body); margin-bottom:var(--space-xs);">체계 구축</div>
            <div style="font-size:var(--font-size-small); color:var(--color-text-muted); line-height:var(--line-height-normal);">B 작업을 지속적으로 할 수 있는 구조를 만드는 일. 조직이 스스로 발전하는 체계.</div>
          </div>
        </div>

      </div>
      <div class="callout" style="margin-top:var(--space-lg);" data-anim="fade-in" data-delay="4">
        대부분의 조직은 A에만 집중한다. B·C가 없으면 성장의 천장이 생긴다.
      </div>
    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
