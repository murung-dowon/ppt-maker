<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>현재 진단</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-two-col">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">현재 진단</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">우리는 A 작업을 잘 하고 있을까?</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-two-col-body">

      <!-- 좌: 질문 + 핵심 메시지 -->
      <div class="slide-col" data-anim="fade-in" data-delay="3">
        <div style="display:flex; flex-direction:column; justify-content:center; height:100%; gap:var(--space-lg);">
          <div>
            <div style="font-size:var(--font-size-display); font-weight:var(--font-weight-black); color:var(--color-accent); line-height:1;">?</div>
            <div style="font-size:var(--font-size-h3); font-weight:var(--font-weight-bold); margin-top:var(--space-sm);">10점 만점에 몇 점?</div>
          </div>
          <div class="callout">
            중요한 건 잘잘못 구분이 아니라<br><strong>'되게끔 하는 것'</strong>
          </div>
        </div>
      </div>

      <!-- 우: 현재 이슈 목록 -->
      <div class="slide-col" data-anim="fade-in" data-delay="4">
        <div style="display:flex; flex-direction:column; gap:var(--space-sm);">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-text-muted); margin-bottom:4px; text-transform:uppercase; letter-spacing:0.08em;">현재 미완료 / 지연 중인 A 작업</div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">샘플 배송 지연</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">인쇄물 감리 누락</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">샘플 패키징 미완</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">부자재 적치 미비</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">런칭 일정 지연</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">마켓 대응 공백</span>
          </div>
          <div class="card" style="padding:var(--space-sm) var(--space-md); display:flex; align-items:center; gap:var(--space-sm);">
            <span style="width:8px; height:8px; border-radius:50%; background:var(--color-accent); flex-shrink:0;"></span>
            <span style="font-size:var(--font-size-small);">아마존 수출 준비</span>
          </div>
        </div>
      </div>

    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
