<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>클로징</title>
  <link rel="stylesheet" href="../core/theme.css">
  <link rel="stylesheet" href="../core/slide-base.css">
  <link rel="stylesheet" href="../core/editor.css">
  <style>
    .slide.layout-closing.theme-warm {
      background: var(--color-text);
    }
    .summary-chips {
      display: flex;
      gap: var(--space-sm);
      justify-content: center;
      margin-top: var(--space-lg);
      flex-wrap: wrap;
    }
    .summary-chip {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: var(--radius-full);
      padding: 8px 20px;
      font-size: var(--font-size-small);
      color: rgba(255, 255, 255, 0.7);
    }
    .summary-chip span {
      color: var(--color-accent);
      font-weight: var(--font-weight-bold);
      margin-right: 6px;
    }
  </style>
</head>
<body class="slide-body">

  <div class="slide layout-closing theme-warm">

    <h2 class="closing-title" data-anim="slide-up" data-delay="1">
      A를 잘 하려면<br>B와 C가 필요하다
    </h2>
    <p class="closing-subtitle" data-anim="fade-in" data-delay="2">
      지금 우리에게 필요한 건 더 열심히가 아니라, 더 잘 설계하는 것
    </p>

    <div class="summary-chips" data-anim="fade-in" data-delay="3">
      <div class="summary-chip"><span>A</span>본업에 집중할 수 있는 환경</div>
      <div class="summary-chip"><span>B</span>일하는 방식의 지속적 개선</div>
      <div class="summary-chip"><span>C</span>스스로 학습하는 조직 구조</div>
    </div>

  </div>

  <script src="../core/nav.js"></script>
  <script src="../core/editor.js"></script>
</body>
</html>
