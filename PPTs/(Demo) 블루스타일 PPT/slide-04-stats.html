<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Demo — KPI Stats</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .kpi-grid {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--space-md);
      align-items: stretch;
    }

    .kpi-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-lg) var(--space-md);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .kpi-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
    }

    .kpi-card.blue::before  { background: #2563eb; }
    .kpi-card.green::before { background: #10b981; }
    .kpi-card.orange::before{ background: #f59e0b; }

    .kpi-number {
      font-size: 80px;
      font-weight: 900;
      line-height: 1;
      letter-spacing: -0.04em;
      margin-bottom: var(--space-sm);
    }

    .kpi-card.blue   .kpi-number { color: #2563eb; }
    .kpi-card.green  .kpi-number { color: #10b981; }
    .kpi-card.orange .kpi-number { color: #f59e0b; }

    .kpi-label {
      font-size: var(--font-size-small);
      font-weight: var(--font-weight-semibold);
      color: var(--color-text);
      margin-bottom: 6px;
    }

    .kpi-sub {
      font-size: var(--font-size-xs);
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    .kpi-trend {
      margin-top: var(--space-sm);
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-semibold);
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }

    .trend-up   { background: #d1fae5; color: #065f46; }
    .trend-down { background: #fee2e2; color: #991b1b; }
    .trend-neu  { background: var(--color-surface-2); color: var(--color-text-muted); }
  </style>
</head>
<body class="slide-body">
  <div class="slide layout-content">

    <div class="slide-header" data-anim="fade-in">
      <span class="slide-logo">Demo Deck</span>
      <span class="slide-tag">Key Metrics</span>
    </div>

    <h1 class="slide-title" data-anim="slide-up" data-delay="1">핵심 성과 지표</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="1"></div>

    <div class="kpi-grid">

      <div class="kpi-card blue" data-anim="zoom-up" data-delay="2">
        <div class="kpi-number">84%</div>
        <div class="kpi-label">월간 사용자 리텐션</div>
        <div class="kpi-sub">최근 30일 기준<br>전체 활성 유저 대상</div>
        <div class="kpi-trend trend-up">↑ 12% vs 전분기</div>
      </div>

      <div class="kpi-card green" data-anim="zoom-up" data-delay="3">
        <div class="kpi-number">2.3×</div>
        <div class="kpi-label">기능 도입 속도 개선</div>
        <div class="kpi-sub">신규 피처 온보딩 완료<br>소요 시간 단축</div>
        <div class="kpi-trend trend-up">↑ Q1 → Q2 비교</div>
      </div>

      <div class="kpi-card orange" data-anim="zoom-up" data-delay="4">
        <div class="kpi-number">$12M</div>
        <div class="kpi-label">연간 반복 매출 (ARR)</div>
        <div class="kpi-sub">엔터프라이즈 계약 포함<br>2026 H1 기준</div>
        <div class="kpi-trend trend-up">↑ 38% YoY</div>
      </div>

    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
