<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Title</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      padding: 80px 120px;
      justify-content: center;
      background: var(--color-bg);
    }

    .page-icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: var(--space-md);
      user-select: none;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 72px;
      font-weight: 700;
      line-height: 1.15;
      letter-spacing: -0.03em;
      color: var(--color-text);
      max-width: 820px;
      margin-bottom: var(--space-md);
    }

    .page-title em {
      font-style: italic;
      color: var(--color-text-muted);
    }

    .page-desc {
      font-family: var(--font-sans);
      font-size: 20px;
      font-weight: 400;
      color: var(--color-text-muted);
      line-height: 1.6;
      max-width: 560px;
      margin-bottom: var(--space-lg);
    }

    .page-meta {
      display: flex;
      align-items: center;
      gap: var(--space-md);
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      color: var(--color-text-light);
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .meta-sep {
      width: 3px;
      height: 3px;
      border-radius: 50%;
      background: var(--color-border-dark);
    }

    .cover-bar {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 180px;
      background: #e9e5df;
      overflow: hidden;
    }

    /* 노션 커버 이미지 느낌 — 추상적 패턴 */
    .cover-bar::after {
      content: '';
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        -45deg,
        transparent,
        transparent 24px,
        rgba(0,0,0,0.03) 24px,
        rgba(0,0,0,0.03) 25px
      );
    }

    .slide.has-cover {
      padding-top: 200px;
      justify-content: flex-start;
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide has-cover">

    <div class="cover-bar"></div>

    <div class="page-icon" data-anim="fade-in" data-delay="1">📋</div>

    <h1 class="page-title" data-anim="slide-up" data-delay="2">
      Product Strategy<br><em>2026</em>
    </h1>

    <p class="page-desc" data-anim="fade-in" data-delay="3">
      지속 가능한 성장을 위한 프레임워크. 디자인, 데이터, 그리고 팀 협업에 관하여.
    </p>

    <div class="page-meta" data-anim="fade-in" data-delay="4">
      <div class="meta-item">
        <span>✍️</span>
        <span>Strategy Team</span>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <span>📅</span>
        <span>April 2026</span>
      </div>
      <div class="meta-sep"></div>
      <div class="meta-item">
        <span>🔒</span>
        <span>Internal only</span>
      </div>
    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
