<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>C 작업</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">C 작업</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">우리가 자꾸 발전할 수 있는<br>체계를 만드는 일</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-body-content">
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-md); margin-bottom:var(--space-md);" data-anim="fade-in" data-delay="3">

        <div class="card" style="border-top:3px solid var(--color-accent);">
          <div style="font-size:var(--font-size-display); font-weight:var(--font-weight-black); color:var(--color-accent); line-height:1;">A</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted); margin-top:4px;">본업을 잘 수행한다</div>
        </div>

        <div class="card" style="border-top:3px solid #888;">
          <div style="font-size:var(--font-size-display); font-weight:var(--font-weight-black); color:#888; line-height:1;">B</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted); margin-top:4px;">방식을 지속 개선한다</div>
        </div>

        <div class="card" style="border-top:3px solid #333; background:var(--color-surface);">
          <div style="font-size:var(--font-size-display); font-weight:var(--font-weight-black); color:#333; line-height:1;">C</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted); margin-top:4px;">개선 자체를 설계한다</div>
        </div>

      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-sm);" data-anim="fade-in" data-delay="4">
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">회고 문화 정착</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">매 분기 B 작업 성과를 점검하고 다음 개선 과제를 정의</div>
        </div>
        <div class="card">
          <div style="font-size:var(--font-size-small); font-weight:var(--font-weight-bold); color:var(--color-accent); margin-bottom:4px;">지식 체계화</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">노하우·의사결정 맥락을 문서화해 조직 자산으로 축적</div>
        </div>
      </div>

      <div class="callout" style="margin-top:var(--space-md);" data-anim="fade-in" data-delay="5">
        A·B·C 세 층위가 함께 돌아갈 때 — 조직은 스스로 성장한다
      </div>
    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
