<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>B 작업 — 개선 과제</title>
  <link rel="stylesheet" href="../core/theme.css">
  <link rel="stylesheet" href="../core/slide-base.css">
  <link rel="stylesheet" href="../core/editor.css">
  <style>
    .b-layout {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--space-md);
      flex: 1;
    }
    .b-card {
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-xs);
    }
    .b-dept {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
      color: var(--color-accent);
    }
    .b-task {
      font-size: var(--font-size-small);
      color: var(--color-text);
      font-weight: var(--font-weight-medium);
      line-height: var(--line-height-normal);
    }
    .tools-card {
      grid-column: 1 / -1;
      background: var(--color-accent-bg);
      border: 1px solid var(--color-accent-light);
      border-radius: var(--radius-lg);
      padding: var(--space-md);
    }
    .tools-label {
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-bold);
      letter-spacing: var(--letter-spacing-wide);
      text-transform: uppercase;
      color: var(--color-accent-dark);
      margin-bottom: var(--space-xs);
    }
    .tools-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .tool-chip {
      background: var(--color-surface);
      border: 1px solid var(--color-border-dark);
      border-radius: var(--radius-full);
      padding: 4px 14px;
      font-size: var(--font-size-xs);
      font-weight: var(--font-weight-medium);
      color: var(--color-text);
    }
  </style>
</head>
<body class="slide-body">

  <div class="slide layout-content theme-warm">

    <p class="slide-eyebrow">B 작업</p>
    <h1 class="slide-title">해야 하는 일을 더 잘할 수 있게 설계하기</h1>
    <div class="slide-title-bar"></div>

    <div class="slide-body-content">
      <div class="b-layout">

        <div class="b-card" data-anim="fade-in" data-delay="2">
          <div class="b-dept">물류</div>
          <div class="b-task">입출고 및 전체 재고 현황 대시보드 구성</div>
        </div>

        <div class="b-card" data-anim="fade-in" data-delay="2">
          <div class="b-dept">마케팅</div>
          <div class="b-task">성과 현황 및 추이 대시보드 구성</div>
        </div>

        <div class="b-card" data-anim="fade-in" data-delay="3">
          <div class="b-dept">경영지원</div>
          <div class="b-task">결재 프로세스 재정비, 자금 현황 및 추이 대시보드 구성</div>
        </div>

        <div class="b-card" data-anim="fade-in" data-delay="3">
          <div class="b-dept">영업</div>
          <div class="b-task">영업 프로세스 재정비, 우선순위 정의 및 관리 체계 수립</div>
        </div>

        <div class="tools-card" data-anim="fade-in" data-delay="4">
          <div class="tools-label">공통 도구 &amp; 방법론</div>
          <div class="tools-chips">
            <span class="tool-chip">업무 티켓 시스템</span>
            <span class="tool-chip">일정 관리 / 공유</span>
            <span class="tool-chip">반복작업 자동화</span>
            <span class="tool-chip">업무 템플릿 제정</span>
            <span class="tool-chip">협업 도구 도입</span>
            <span class="tool-chip">회의 방식 개선</span>
            <span class="tool-chip">커뮤니케이션 규칙 제정</span>
            <span class="tool-chip">시스템 개발</span>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script src="../core/nav.js"></script>
  <script src="../core/editor.js"></script>
</body>
</html>
