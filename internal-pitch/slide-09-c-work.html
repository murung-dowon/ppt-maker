<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>C 작업 — 체계 만들기</title>
  <link rel="stylesheet" href="../core/theme.css">
  <link rel="stylesheet" href="../core/slide-base.css">
  <link rel="stylesheet" href="../core/editor.css">
  <style>
    .c-flow {
      display: flex;
      gap: var(--space-sm);
      align-items: stretch;
      flex: 1;
    }
    .c-step {
      flex: 1;
      background: var(--color-surface);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: 0;
      display: flex;
      flex-direction: column;
      gap: 0;
      position: relative;
      overflow: hidden;
    }
    .c-step-img {
      width: 100%;
      height: 110px;
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--color-text-light);
      font-size: var(--font-size-xs);
      letter-spacing: var(--letter-spacing-wide);
      flex-shrink: 0;
    }
    .c-step.highlight .c-step-img {
      background: var(--color-accent-light);
      border-color: var(--color-accent-light);
      color: var(--color-accent);
    }
    .c-step-body {
      padding: var(--space-md);
      display: flex;
      flex-direction: column;
      gap: var(--space-sm);
      flex: 1;
    }
    .c-step.highlight {
      background: var(--color-accent-bg);
      border-color: var(--color-accent-light);
    }
    .c-step-num {
      font-size: var(--font-size-h1);
      font-weight: var(--font-weight-black);
      color: var(--color-border-dark);
      line-height: 1;
    }
    .c-step.highlight .c-step-num {
      color: var(--color-accent-light);
    }
    .c-step-title {
      font-size: var(--font-size-h4);
      font-weight: var(--font-weight-bold);
      color: var(--color-text);
    }
    .c-step-desc {
      font-size: var(--font-size-small);
      color: var(--color-text-muted);
      line-height: var(--line-height-normal);
      flex: 1;
    }
    .arrow {
      display: flex;
      align-items: center;
      color: var(--color-accent);
      font-size: var(--font-size-h3);
      flex-shrink: 0;
      padding-top: 40px;
    }
  </style>
</head>
<body class="slide-body">

  <div class="slide layout-content theme-warm">

    <p class="slide-eyebrow">C 작업</p>
    <h1 class="slide-title">우리가 자꾸 발전할 수 있는 체계</h1>
    <div class="slide-title-bar"></div>

    <div class="slide-body-content">
      <div class="c-flow">

        <div class="c-step" data-anim="slide-up" data-delay="2">
          <div class="c-step-img">이미지</div>
          <div class="c-step-body">
            <div class="c-step-num">01</div>
            <div class="c-step-title">현황 파악</div>
            <div class="c-step-desc">각 팀의 A 작업 현황을 정기적으로 측정하고 기록한다</div>
          </div>
        </div>

        <div class="arrow" data-anim="fade-in" data-delay="2">→</div>

        <div class="c-step" data-anim="slide-up" data-delay="3">
          <div class="c-step-img">이미지</div>
          <div class="c-step-body">
            <div class="c-step-num">02</div>
            <div class="c-step-title">병목 식별</div>
            <div class="c-step-desc">반복되는 문제와 비효율을 구조적으로 파악한다</div>
          </div>
        </div>

        <div class="arrow" data-anim="fade-in" data-delay="3">→</div>

        <div class="c-step" data-anim="slide-up" data-delay="4">
          <div class="c-step-img">이미지</div>
          <div class="c-step-body">
            <div class="c-step-num">03</div>
            <div class="c-step-title">B 작업 설계</div>
            <div class="c-step-desc">개선 과제를 정의하고 우선순위를 세워 실행한다</div>
          </div>
        </div>

        <div class="arrow" data-anim="fade-in" data-delay="4">→</div>

        <div class="c-step highlight" data-anim="slide-up" data-delay="4">
          <div class="c-step-img">이미지</div>
          <div class="c-step-body">
            <div class="c-step-num">04</div>
            <div class="c-step-title">반복 개선</div>
            <div class="c-step-desc">결과를 검증하고 다음 사이클에 반영하는 루프를 만든다</div>
          </div>
        </div>

      </div>

      <div class="callout" style="margin-top: var(--space-md);" data-anim="fade-in" data-delay="4">
        C 작업은 B 작업을 잘 하기 위한 B 작업이다 — 조직이 스스로 학습하는 구조
      </div>
    </div>

  </div>

  <script src="../core/nav.js"></script>
  <script src="../core/editor.js"></script>
</body>
</html>
