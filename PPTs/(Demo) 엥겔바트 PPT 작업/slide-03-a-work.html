<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>A 작업</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">A 작업</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">개인이 원래 해야 하는 일</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-body-content">
      <p style="font-size:var(--font-size-body); color:var(--color-text-muted); margin-bottom:var(--space-md);" data-anim="fade-in" data-delay="3">'각자 해야 하는 일 알아서 잘 하기'</p>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:var(--space-sm);" data-anim="fade-in" data-delay="3">
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">사업 기획 / 제품개발 / 경영</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">회사가 나아갈 방향과 제품을 만드는 핵심 업무</div>
        </div>
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">물류 운영</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">입출고, 재고 관리, 배송 등 물리적 운영</div>
        </div>
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">마케팅 기획 / 운영 / 성과관리</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">브랜드 성장과 채널 운영, 수치 기반 성과 추적</div>
        </div>
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">경영지원 / 행정</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">결재, 계약, 재무, 인사 등 내부 운영 지원</div>
        </div>
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">제품 판매 / 영업</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">채널 입점, 거래처 관리, 매출 확대</div>
        </div>
        <div class="card">
          <div style="font-weight:var(--font-weight-semibold); margin-bottom:4px;">사무실 이전 / 짐 나르기</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">팀 전체가 움직여야 하는 일도 A 작업이다</div>
        </div>
      </div>
    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
