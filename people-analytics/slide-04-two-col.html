<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>People Analytics — 2단 슬라이드</title>
  <link rel="stylesheet" href="../core/theme.css">
  <link rel="stylesheet" href="../core/slide-base.css">
  <link rel="stylesheet" href="../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-two-col">

    <h1 class="slide-title" data-anim="fade-in">요구되는 역량 세트</h1>
    <div class="slide-title-bar"></div>

    <div class="two-col" style="margin-top: var(--space-lg);">

      <!-- 왼쪽 컬럼 -->
      <div data-anim="slide-up" data-delay="1">
        <p class="col-title">🔢 데이터/분석 역량</p>
        <ul class="slide-list" style="gap: var(--space-xs);">
          <li>Python / R / SQL</li>
          <li>통계 기초 (회귀, 군집 등)</li>
          <li>데이터 시각화 (Tableau, 파이썬)</li>
          <li>실험 설계 (A/B 테스트)</li>
          <li>머신러닝 기초</li>
        </ul>
      </div>

      <!-- 오른쪽 컬럼 -->
      <div data-anim="slide-up" data-delay="2">
        <p class="col-title">🧠 HR/비즈니스 역량</p>
        <ul class="slide-list" style="gap: var(--space-xs);">
          <li>HR 도메인 이해 (채용, 성과, 보상)</li>
          <li>비즈니스 문제 정의 능력</li>
          <li>스토리텔링 & 커뮤니케이션</li>
          <li>이해관계자 관리</li>
          <li>조직심리학 기초</li>
        </ul>

        <div class="callout" style="margin-top: var(--space-md);" data-anim="fade-in" data-delay="3">
          <span class="highlight">교집합</span>이 클수록<br>더 강력한 People Analyst
        </div>
      </div>

    </div>

  </div>

  <script src="../core/nav.js"></script>
  <script src="../core/editor.js"></script>
</body>
</html>
