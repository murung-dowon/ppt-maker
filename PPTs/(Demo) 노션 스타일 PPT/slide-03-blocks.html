<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Content Blocks</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      background: var(--color-bg);
      padding: 64px 120px;
    }

    .notion-page-title {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-lg);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    /* 노션 블록 공통 */
    .block {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 5px 0;
      position: relative;
    }

    /* 드래그 핸들 */
    .block-handle {
      font-size: 14px;
      color: var(--color-border-dark);
      opacity: 0;
      padding-top: 2px;
      user-select: none;
      flex-shrink: 0;
      width: 18px;
    }

    .block:hover .block-handle { opacity: 1; }

    /* H2 블록 */
    .block-h2 .block-content {
      font-family: var(--font-serif);
      font-size: 26px;
      font-weight: 600;
      color: var(--color-text);
      letter-spacing: -0.01em;
      line-height: 1.3;
      padding-top: var(--space-sm);
    }

    /* Bullet 블록 */
    .block-bullet .block-content {
      font-family: var(--font-sans);
      font-size: var(--font-size-body);
      color: var(--color-text);
      line-height: 1.6;
    }

    .block-bullet .bullet-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--color-text-muted);
      margin-top: 9px;
      flex-shrink: 0;
    }

    .block-bullet .block-content .muted {
      color: var(--color-text-muted);
      font-size: var(--font-size-small);
    }

    /* Callout 블록 */
    .block-callout {
      background: var(--callout-yellow);
      border-radius: var(--radius-md);
      padding: 12px 16px;
      margin-top: 8px;
    }

    .block-callout .callout-emoji {
      font-size: 20px;
      flex-shrink: 0;
    }

    .block-callout .block-content {
      font-family: var(--font-sans);
      font-size: var(--font-size-small);
      color: var(--color-text);
      line-height: 1.6;
    }

    /* 구분 */
    .block-divider {
      height: 1px;
      background: var(--color-border);
      margin: 12px 0;
    }

    .sub-bullet {
      margin-left: 24px;
    }

    .sub-bullet .bullet-dot {
      width: 4px;
      height: 4px;
      background: var(--color-border-dark) !important;
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide">

    <div class="notion-page-title" data-anim="fade-in" data-delay="1">
      <span>🔍</span>
      <span>세 가지 핵심 과제</span>
    </div>

    <div data-anim="fade-in" data-delay="2">
      <div class="block block-h2">
        <span class="block-handle">⠿</span>
        <div class="block-content">1 · 사용자 리텐션 저하</div>
      </div>
      <div class="block block-bullet sub-bullet">
        <div class="bullet-dot"></div>
        <div class="block-content">첫 달 이탈률 <strong>+18%</strong> 상승 — 온보딩 경험 미흡이 주원인으로 분석됨</div>
      </div>
      <div class="block block-bullet sub-bullet">
        <div class="bullet-dot"></div>
        <div class="block-content">핵심 기능 미사용 비율: <strong>63%</strong> <span class="muted">— 인지 부재 vs 접근성 문제 분리 필요</span></div>
      </div>
    </div>

    <div class="block-divider" data-anim="fade-in" data-delay="2"></div>

    <div data-anim="fade-in" data-delay="3">
      <div class="block block-h2">
        <span class="block-handle">⠿</span>
        <div class="block-content">2 · 팀 간 컨텍스트 손실</div>
      </div>
      <div class="block block-bullet sub-bullet">
        <div class="bullet-dot"></div>
        <div class="block-content">제품 → 디자인 → 엔지니어링 핸드오프에서 평균 <strong>2.3일</strong> 지연 발생</div>
      </div>
    </div>

    <div class="block-divider" data-anim="fade-in" data-delay="3"></div>

    <div data-anim="fade-in" data-delay="4">
      <div class="block block-h2">
        <span class="block-handle">⠿</span>
        <div class="block-content">3 · 데이터 기반 의사결정 부재</div>
      </div>
      <div class="block block-bullet sub-bullet">
        <div class="bullet-dot"></div>
        <div class="block-content">주요 의사결정의 <strong>72%</strong>가 직관에 의존 — 검증 루프 없음</div>
      </div>
    </div>

    <div class="block-divider" data-anim="fade-in" data-delay="4"></div>

    <div class="block block-callout" data-anim="fade-in" data-delay="5">
      <span class="callout-emoji">💡</span>
      <div class="block-content">
        세 과제 모두 사람·프로세스·도구의 <strong>정렬 문제</strong>로 귀결됩니다. 각각을 독립적으로 해결하려는 시도는 효과가 제한적입니다.
      </div>
    </div>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
