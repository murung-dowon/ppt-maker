<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Demo — Section 01</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    /* 우측 하단 장식 원 (흰색 반투명) */
    .slide.layout-section::before {
      content: '';
      position: absolute;
      right: -80px;
      top: -80px;
      width: 360px;
      height: 360px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.12);
    }
    .slide.layout-section::after {
      content: '';
      position: absolute;
      right: -160px;
      top: -160px;
      width: 560px;
      height: 560px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.07);
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide layout-section">

    <div class="section-number" data-anim="fade-in" data-delay="1">01</div>

    <p class="section-label" data-anim="fade-in" data-delay="2">Chapter One</p>
    <h2 class="section-title" data-anim="slide-up" data-delay="3">Where We Are Today</h2>
    <p class="section-desc" data-anim="fade-in" data-delay="4">
      현황 진단 · 문제 정의 · 기회 발견
    </p>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
