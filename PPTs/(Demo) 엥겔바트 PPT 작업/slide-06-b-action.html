<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>B 작업 실행 방안</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
</head>
<body class="slide-body">

  <div class="slide layout-content">
    <p class="slide-eyebrow" data-anim="fade-in" data-delay="1">B 작업 실행 방안</p>
    <h1 class="slide-title" data-anim="slide-up" data-delay="2">어떻게 실행할 것인가</h1>
    <div class="slide-title-bar" data-anim="fade-in" data-delay="2"></div>

    <div class="slide-body-content">
      <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:var(--space-md);" data-anim="fade-in" data-delay="3">

        <div class="card" style="text-align:center;">
          <div style="font-size:32px; margin-bottom:var(--space-xs);">📋</div>
          <div style="font-weight:var(--font-weight-bold); margin-bottom:4px;">업무 티켓 시스템</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">모든 업무를 가시화하고 우선순위를 명확히</div>
        </div>

        <div class="card" style="text-align:center;">
          <div style="font-size:32px; margin-bottom:var(--space-xs);">⚡</div>
          <div style="font-weight:var(--font-weight-bold); margin-bottom:4px;">업무 자동화</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">반복 작업을 줄여 핵심 업무 집중 시간 확보</div>
        </div>

        <div class="card" style="text-align:center;">
          <div style="font-size:32px; margin-bottom:var(--space-xs);">🛠</div>
          <div style="font-weight:var(--font-weight-bold); margin-bottom:4px;">시스템 개발</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">맞춤형 내부 도구로 운영 효율 극대화</div>
        </div>

        <div class="card" style="text-align:center;">
          <div style="font-size:32px; margin-bottom:var(--space-xs);">📅</div>
          <div style="font-weight:var(--font-weight-bold); margin-bottom:4px;">일정 관리 / 공유</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">팀 전체 일정을 투명하게 공유하고 조율</div>
        </div>

        <div class="card" style="text-align:center; grid-column: span 2;">
          <div style="font-size:32px; margin-bottom:var(--space-xs);">💬</div>
          <div style="font-weight:var(--font-weight-bold); margin-bottom:4px;">커뮤니케이션 규칙 제정</div>
          <div style="font-size:var(--font-size-small); color:var(--color-text-muted);">채널별 목적과 응답 규칙을 정해 소통 비용 절감</div>
        </div>

      </div>
    </div>
  </div>

  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
