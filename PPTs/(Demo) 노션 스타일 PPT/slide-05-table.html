<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Notion Demo — Table</title>
  <link rel="stylesheet" href="../../core/theme.css">
  <link rel="stylesheet" href="theme-notion.css">
  <link rel="stylesheet" href="../../core/slide-base.css">
  <link rel="stylesheet" href="../../core/editor.css">
  <style>
    .slide {
      background: var(--color-bg);
      padding: 64px 96px;
    }

    .page-title {
      font-family: var(--font-serif);
      font-size: 44px;
      font-weight: 700;
      color: var(--color-text);
      letter-spacing: -0.02em;
      margin-bottom: var(--space-md);
      display: flex;
      align-items: center;
      gap: var(--space-sm);
    }

    /* 노션 데이터베이스 테이블 */
    .n-table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--font-sans);
      flex: 1;
    }

    .n-table thead tr {
      background: var(--color-surface-2);
      border-bottom: 1px solid var(--color-border);
    }

    .n-table thead th {
      text-align: left;
      font-size: var(--font-size-xs);
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--color-text-muted);
      padding: 10px 16px;
    }

    .n-table thead th:first-child {
      border-radius: var(--radius-md) 0 0 0;
    }

    .n-table thead th:last-child {
      border-radius: 0 var(--radius-md) 0 0;
    }

    .n-table tbody tr {
      border-bottom: 1px solid var(--color-border);
    }

    .n-table tbody tr:last-child {
      border-bottom: none;
    }

    .n-table tbody tr:hover {
      background: rgba(0,0,0,0.02);
    }

    .n-table tbody td {
      padding: 12px 16px;
      font-size: var(--font-size-small);
      color: var(--color-text);
      vertical-align: middle;
    }

    .n-table tbody td.title-cell {
      font-weight: 500;
    }

    /* 상태 태그 */
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: var(--radius-full);
    }

    .status-tag.done     { background: #edf3ec; color: #448361; }
    .status-tag.active   { background: #fbf3db; color: #a87845; }
    .status-tag.todo     { background: var(--color-surface-2); color: var(--color-text-muted); }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
    }

    .status-tag.done   .status-dot  { background: #448361; }
    .status-tag.active .status-dot  { background: #a87845; }
    .status-tag.todo   .status-dot  { background: var(--color-border-dark); }

    /* 우선순위 */
    .priority {
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .priority.high   { color: #d44c47; }
    .priority.medium { color: #a87845; }
    .priority.low    { color: var(--color-text-muted); }

    /* 담당자 아바타 */
    .assignee {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--color-text-muted);
    }

    .avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: var(--color-surface-2);
      border: 1px solid var(--color-border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
    }
  </style>
</head>
<body class="slide-body">
  <div class="slide">

    <div class="page-title" data-anim="fade-in" data-delay="1">
      <span>🗂</span>
      <span>Q2 이니셔티브</span>
    </div>

    <table class="n-table" data-anim="fade-in" data-delay="2">
      <thead>
        <tr>
          <th>이니셔티브</th>
          <th>상태</th>
          <th>우선순위</th>
          <th>담당자</th>
          <th>마감</th>
          <th>진행률</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="title-cell">🎯 온보딩 플로우 재설계</td>
          <td><span class="status-tag active"><span class="status-dot"></span>진행 중</span></td>
          <td><span class="priority high">⬆ High</span></td>
          <td><div class="assignee"><div class="avatar">JK</div> Jungkyo</div></td>
          <td style="color:var(--color-text-muted)">Apr 30</td>
          <td style="color:var(--color-text-muted)">68%</td>
        </tr>
        <tr>
          <td class="title-cell">📊 분석 대시보드 v1</td>
          <td><span class="status-tag active"><span class="status-dot"></span>진행 중</span></td>
          <td><span class="priority high">⬆ High</span></td>
          <td><div class="assignee"><div class="avatar">SY</div> Seoyeon</div></td>
          <td style="color:var(--color-text-muted)">May 15</td>
          <td style="color:var(--color-text-muted)">42%</td>
        </tr>
        <tr>
          <td class="title-cell">🔗 팀 협업 기능</td>
          <td><span class="status-tag todo"><span class="status-dot"></span>예정</span></td>
          <td><span class="priority medium">→ Medium</span></td>
          <td><div class="assignee"><div class="avatar">MJ</div> Minjae</div></td>
          <td style="color:var(--color-text-muted)">Jun 30</td>
          <td style="color:var(--color-text-muted)">0%</td>
        </tr>
        <tr>
          <td class="title-cell">⚡ 성능 최적화 (p95)</td>
          <td><span class="status-tag done"><span class="status-dot"></span>완료</span></td>
          <td><span class="priority medium">→ Medium</span></td>
          <td><div class="assignee"><div class="avatar">HW</div> Hyunwoo</div></td>
          <td style="color:var(--color-text-muted)">Apr 10</td>
          <td style="color:#448361">100%</td>
        </tr>
        <tr>
          <td class="title-cell">🌍 다국어 지원 (EN/JP)</td>
          <td><span class="status-tag todo"><span class="status-dot"></span>예정</span></td>
          <td><span class="priority low">↓ Low</span></td>
          <td><div class="assignee"><div class="avatar">YR</div> Yerin</div></td>
          <td style="color:var(--color-text-muted)">Sep 30</td>
          <td style="color:var(--color-text-muted)">0%</td>
        </tr>
      </tbody>
    </table>

  </div>
  <script src="../../core/nav.js"></script>
  <script src="../../core/editor.js"></script>
</body>
</html>
